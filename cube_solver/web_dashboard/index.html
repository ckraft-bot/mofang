<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mofang Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #111; color: #f3f3f3; }
      .app { display: grid; grid-template-columns: 1fr 320px; min-height: 100vh; }
      .panel { padding: 16px; }
      .cube { width: 320px; height: 320px; border: 1px solid #444; margin: 0 auto 20px; display: grid; place-items: center; }
      button { padding: 8px 12px; margin: 4px 0; border-radius: 6px; border: none; cursor: pointer; }
      .log { background: #1b1b1b; padding: 12px; border-radius: 8px; min-height: 180px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="panel">
        <h1>Mofang</h1>
        <p>Live scan state and solved move list.</p>
        <div id="cube" class="cube">3D cube preview</div>
        <video id="cameraPreview" autoplay playsinline muted style="width:100%;max-width:320px;border-radius:8px;background:#000;"></video>
        <div id="colorPicker" style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;"></div>
        <div id="facePicker" style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;"></div>
        <button id="resetBtn">Reset scan</button>
        <button id="solveBtn">Solve</button>
        <div id="moves"></div>
      </div>
      <div class="panel">
        <h2>Message</h2>
        <div id="status" class="log">Waiting for backend…</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
